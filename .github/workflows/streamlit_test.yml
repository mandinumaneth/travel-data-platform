name: Streamlit Syntax Test

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main, dev]

jobs:
  streamlit-compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dashboard dependencies
        run: |
          python -m pip install --upgrade pip
          pip install streamlit pandas plotly snowflake-connector-python python-dotenv

      - name: Compile dashboard modules
        run: |
          python -m py_compile dashboard/app.py
          python -m py_compile dashboard/snowflake_connection.py
