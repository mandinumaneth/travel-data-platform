x-airflow-common: &airflow-common
  build:
    context: ../../
    dockerfile: infrastructure/docker/airflow/Dockerfile
  env_file:
    - ../../.env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-travel_user}:${POSTGRES_PASSWORD:-travel_password}@postgres:5432/${POSTGRES_DB:-travel_db}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-change_me}
    AIRFLOW__WEBSERVER__WORKERS: "1"
    AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    PROJECT_ROOT: /opt/airflow/project
    POSTGRES_HOST: postgres
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    PYTHONPATH: /opt/airflow/project
  volumes:
    - ../../orchestration/dags:/opt/airflow/dags
    - ../../orchestration/plugins:/opt/airflow/plugins
    - ../../:/opt/airflow/project
    - airflow-logs:/opt/airflow/logs
  networks:
    - travel-net
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-travel_db}
      POSTGRES_USER: ${POSTGRES_USER:-travel_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-travel_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-travel_user} -d ${POSTGRES_DB:-travel_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - travel-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - travel-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - travel-net

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username ${AIRFLOW_ADMIN_USERNAME:-airflow} \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email admin@example.com \
          --password ${AIRFLOW_ADMIN_PASSWORD:-airflow}
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  spark-master:
    image: apache/spark:3.5.1
    env_file:
      - ../../.env
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.master.Master",
        "--host",
        "spark-master",
        "--port",
        "7077",
        "--webui-port",
        "8080"
      ]
    ports:
      - "8888:8080"
      - "7077:7077"
    networks:
      - travel-net

  spark-worker:
    image: apache/spark:3.5.1
    env_file:
      - ../../.env
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.worker.Worker",
        "spark://spark-master:7077",
        "--webui-port",
        "8081"
      ]
    ports:
      - "8081:8081"
    depends_on:
      - spark-master
    networks:
      - travel-net

  kafka-producer:
    build:
      context: ../../
      dockerfile: ingestion/kafka/Dockerfile
    env_file:
      - ../../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - travel-net

  batch-ingestion:
    build:
      context: ../../
      dockerfile: ingestion/batch/Dockerfile
    env_file:
      - ../../.env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ../../data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - travel-net

  streamlit:
    build:
      context: ../../
      dockerfile: dashboard/Dockerfile
    env_file:
      - ../../.env
    ports:
      - "8501:8501"
    restart: unless-stopped
    networks:
      - travel-net

volumes:
  postgres-data:
  airflow-logs:

networks:
  travel-net:
    name: travel-net
